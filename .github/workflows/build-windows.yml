name: Build Windows App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            desktop-app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Build Backend Binary
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller shop-backend.spec
        shell: cmd

      - name: Copy Backend Binary
        run: |
          if (Test-Path "desktop-app/resources/backend/shop-backend") {
            Remove-Item -Force "desktop-app/resources/backend/shop-backend"
          }
          New-Item -ItemType Directory -Force -Path "desktop-app/resources/backend"
          Copy-Item -Force "backend/dist/shop-backend.exe" "desktop-app/resources/backend/shop-backend.exe"
        shell: pwsh

      - name: Build React Frontend
        run: |
          cd frontend
          npm install
          npm run build
        shell: pwsh

      - name: Copy Frontend Assets
        run: |
          if (Test-Path "desktop-app/frontend") {
            Remove-Item -Recurse -Force "desktop-app/frontend/*" -ErrorAction SilentlyContinue
          } else {
            New-Item -ItemType Directory -Force -Path "desktop-app/frontend"
          }
          Copy-Item -Recurse -Force "frontend/build/*" "desktop-app/frontend/"
        shell: pwsh

      - name: Build Electron App
        run: |
          cd desktop-app
          npm install
          npm run build -- --win
        shell: pwsh

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: Alone-app-Windows-Installer
          path: desktop-app/dist/*.exe
          retention-days: 7

